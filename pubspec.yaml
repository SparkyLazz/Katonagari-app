name: katonagari
description: Know your money — personal finance tracker
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:          # ← moved here from flutter: section
    sdk: flutter

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Fonts
  google_fonts: ^6.2.1

  # Auth
  local_auth: ^2.3.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.68.0

  # Swipe to delete
  flutter_slidable: ^3.1.0

  # Utilities
  shared_preferences: ^2.3.2
  intl: ^0.20.2                   # ← kept pinned version (not 'any')
  csv: ^6.0.0
  share_plus: ^10.0.2
  uuid: ^4.4.2
  pdf: ^3.10.8

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/katonagari_logo.png"
  adaptive_icon_background: "#0D0C0A"
  adaptive_icon_foreground: "assets/images/katonagari_logo.png"
  min_sdk_android: 21

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  rxdart: ^0.27.7
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/katonagari_logo.png

  fonts:
    - family: DM Serif Display
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf

    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800

    - family: DM Mono
      fonts:
        - asset: assets/fonts/DMMono-Light.ttf
          weight: 300
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500